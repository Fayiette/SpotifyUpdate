name: spotify-fetch

on:
  schedule:
    # Pattern: Alternating 1.5hr (90 min) and 1.7hr (102 min)
    # Starts at 00:00 (12:00 AM)
    - cron: '0 0 * * *'    # 00:00
    - cron: '30 1 * * *'   # 01:30 (+ 1.5hr)
    - cron: '12 3 * * *'   # 03:12 (+ 1.7hr)
    - cron: '42 4 * * *'   # 04:42 (+ 1.5hr)
    - cron: '24 6 * * *'   # 06:24 (+ 1.7hr)
    - cron: '54 7 * * *'   # 07:54 (+ 1.5hr)
    - cron: '36 9 * * *'   # 09:36 (+ 1.7hr)
    - cron: '06 11 * * *'  # 11:06 (+ 1.5hr)
    - cron: '48 12 * * *'  # 12:48 (+ 1.7hr)
    - cron: '18 14 * * *'  # 14:18 (+ 1.5hr)
    - cron: '00 16 * * *'  # 16:00 (+ 1.7hr)
    - cron: '30 17 * * *'  # 17:30 (+ 1.5hr)
    - cron: '12 19 * * *'  # 19:12 (+ 1.7hr)
    - cron: '42 20 * * *'  # 20:42 (+ 1.5hr)
    - cron: '24 22 * * *'  # 22:24 (+ 1.7hr)
    - cron: '54 23 * * *'  # 23:54 (+ 1.5hr)
  workflow_dispatch:

concurrency:
  group: spotify-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run spotify_fetch.py
        env:
          R2_PREFIX: ${{ secrets.SPOTIFY_R2_PREFIX }}
          R2_HISTORY_PARQUET_KEY: ${{ secrets.SPOTIFY_R2_HISTORY_PARQUET_KEY }}
          R2_SONGS_PARQUET_KEY: ${{ secrets.SPOTIFY_R2_SONGS_PARQUET_KEY }}
          R2_ALBUMS_PARQUET_KEY: ${{ secrets.SPOTIFY_R2_ALBUMS_PARQUET_KEY }}
          R2_ARTISTS_PARQUET_KEY: ${{ secrets.SPOTIFY_R2_ARTISTS_PARQUET_KEY }}
          SPOTIFY_MAX_PAGES: 2
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python spotify_fetch.py
